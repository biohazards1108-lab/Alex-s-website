<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Custom Gear | Artisan Fishing Equipment</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brass: #d4af37;
            --white: #ffffff;
            --deep-river: #050a0f;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--white);
            /* THE FIX: Darkened overlay so the river looks deep and blue, not white/gray */
            background: linear-gradient(rgba(5, 10, 15, 0.7), rgba(5, 10, 15, 0.7)), 
                        url('https://images.unsplash.com/photo-1437482273821-839346d01242?q=80&w=2000&auto=format&fit=crop');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            scroll-behavior: smooth;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 8%; background: rgba(0, 0, 0, 0.95);
            border-bottom: 2px solid var(--brass); position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--brass); text-transform: uppercase; font-weight: 900; letter-spacing: 3px; }
        .nav-links { display: flex; gap: 20px; list-style: none; margin: 0; }
        .nav-links a { text-decoration: none; color: white; font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .hero {
            height: 40vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center;
        }

        .hero h1 { font-family: 'Playfair Display', serif; font-size: 4rem; color: var(--brass); margin: 0; text-shadow: 2px 2px 20px rgba(0,0,0,0.8); }

        .section { padding: 60px 10%; }
        .title { font-family: 'Playfair Display', serif; text-align: center; font-size: 2.5rem; color: var(--brass); margin-bottom: 40px; text-transform: uppercase; }

        /* Modern Glass Box: Darker and cleaner */
        .glass-container {
            background: rgba(0, 0, 0, 0.8); 
            padding: 45px; border-radius: 12px;
            border: 1px solid rgba(212, 175, 55, 0.4); 
            max-width: 800px; margin: 0 auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        input, textarea, select {
            width: 100%; padding: 15px; margin: 10px 0 20px 0;
            background: rgba(255, 255, 255, 0.05); border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box;
        }

        .btn {
            background: var(--brass); color: #000; border: none; padding: 18px;
            font-weight: 900; text-transform: uppercase; cursor: pointer; width: 100%; letter-spacing: 2px;
        }

        .review-card { background: rgba(0,0,0,0.85); padding: 30px; border-radius: 8px; border: 1px solid #222; margin-bottom: 20px; }

        .dono-btn {
            display: inline-block; margin: 10px; padding: 15px 35px;
            background: var(--brass); color: black; text-decoration: none;
            font-weight: bold; border-radius: 4px; transition: 0.3s;
        }

        footer { padding: 40px; text-align: center; font-size: 0.7rem; background: rgba(0,0,0,0.95); margin-top: 50px; border-top: 1px solid var(--brass); color: #888; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Alex's Custom Gear</div>
        <ul class="nav-links">
            <li><a href="#order">Order Gear</a></li>
            <li><a href="#reviews">Reviews</a></li>
            <li><a href="#support">Support Alex</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>Legacy on the Line</h1>
        <p style="font-size: 1.1rem; opacity: 0.8; letter-spacing: 1px;">Artisan Tackle for the Master Angler</p>
    </header>

    <section id="order" class="section">
        <h2 class="title">Custom Commissions</h2>
        <div class="glass-container">
            <form>
                <label>Inventory Choice</label>
                <select>
                    <option>Custom Hand-Turned Rod</option>
                    <option>Bespoke Brass Reel</option>
                    <option>Premium Line & Inventory Set</option>
                    <option>Full Expedition Pack</option>
                </select>
                <input type="text" placeholder="Your Name">
                <textarea rows="4" placeholder="Specifics (Wood types, rod weight, intended species...)"></textarea>
                <button type="submit" class="btn">Submit Design Request</button>
            </form>
        </div>
    </section>

    <section id="reviews" class="section">
        <h2 class="title">Angler Reports</h2>
        <div style="max-width: 800px; margin: 0 auto;">
