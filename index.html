<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Custom Gear | Artisan Fishing Equipment</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brass: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --deep-river: #050a0f;
        }

        * { cursor: none; }

        body {
            margin: 0; padding: 0; font-family: 'Montserrat', sans-serif; color: #fff;
            background-color: var(--deep-river);
            background-image: linear-gradient(rgba(0, 0, 0, 0.75), rgba(0, 0, 0, 0.85)), 
                              url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?q=80&w=2000&auto=format&fit=crop');
            background-attachment: fixed; background-size: cover; background-position: center;
            scroll-behavior: smooth; overflow-x: hidden;
        }

        #cursor {
            width: 15px; height: 15px; border: 2px solid var(--brass);
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 9999; transition: transform 0.1s ease;
            box-shadow: 0 0 15px var(--gold-glow); background: rgba(212, 175, 55, 0.1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: all 1s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

            display: flex; justify-content: space-between; align-items: center;
            padding: 1.5rem 8%; background: rgba(0, 0, 0, 0.95);
