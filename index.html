<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alex's Custom Gear | Artisan Fishing Equipment</title>
    <style>
        :root {
            --deep-black: #0a0a0a;
            --burned-orange: #b3541e;
            --warm-wood: #3d2b1f;
            --parchment: #d7ccc8;
            --brass: #c5a059;
        }

        body {
            font-family: 'Playfair Display', serif;
            margin: 0;
            background-color: var(--deep-black);
            color: var(--parchment);
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 8%;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--warm-wood);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-size: 1.1rem; letter-spacing: 5px; text-transform: uppercase; color: var(--brass); font-weight: 900; }
        .nav-links { display: flex; gap: 30px; list-style: none; margin: 0; }
        .nav-links a { text-decoration: none; color: var(--parchment); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .nav-links a:hover { color: var(--burned-orange); }

        /* Luxury Hero */
        .hero {
            height: 85vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1541742425281-c1d3bc8abc46?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 5px solid var(--burned-orange);
        }

        .hero h1 { font-size: 5rem; color: var(--brass); margin: 0; line-height: 1; letter-spacing: -2px; }
        .hero p { font-size: 1.1rem; max-width: 600px; margin-top: 25px; font-style: italic; color: #888; letter-spacing: 1px; }

        /* Sections */
        .section { padding: 120px 10%; }
        .section-title { text-align: center; font-size: 3rem; margin-bottom: 60px; color: var(--brass); text-transform: uppercase; letter-spacing: 4px; }

        /* Craftsmanship Section */
        .craft-flex { display: flex; align-items: center; gap: 50px; flex-wrap: wrap; margin-bottom: 100px; }
        .craft-text { flex: 1; min-width: 300px; }
        .craft-text h2 { color: var(--burned-orange); font-size: 2.5rem; }
        .craft-img { flex: 1; min-width: 300px; height: 400px; background: url('https://images.unsplash.com/photo-1516934024742-b461fba47600?q=80&w=1000') center/cover; border: 1px solid var(--brass); border-radius: 4px; }

        /* Gear Cards */
        .gear-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        .gear-card { background: #111; border: 1px solid #222; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .gear-card:hover { transform: scale(1.02); border-color: var(--burned-orange); }
        .gear-img { width: 100%; height: 300px; object-fit: cover; opacity: 0.8; transition: 0.5s; }
        .gear-card:hover .gear-img { opacity: 1; }
        .gear-info { padding: 30px; border-top: 1px solid #222; }
        .gear-info h3 { color: var(--brass); margin-top: 0; text-transform: uppercase; }

        /* Modern Order Form */
        .order-container { max-width: 900px; margin: 0 auto; background: #0f0f0f; padding: 60px; border: 1px solid var(--warm-wood); position: relative; }
        .order-container::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; height: 4px; background: var(--burned-orange); }
        input, textarea, select { width: 100%; padding: 18px; margin: 10px 0 30px 0; background: #050505; border: 1px solid #333; color: var(--parchment); font-family: 'Playfair Display', serif; }
        .submit-btn { background: var(--burned-orange); color: white; border: none; padding: 20px; width: 100%; font-weight: 900; text-transform: uppercase; cursor: pointer; letter-spacing: 3px; }

        /* Support/Pay */
        .support-card { text-align: center; background: linear-gradient(145deg, #111, #050505); padding: 80px 40px; border: 1px solid var(--burned-orange); }
        .pay-btn { display: inline-block; margin: 15px; padding: 15px 45px; border: 1px solid var(--brass); color: var(--brass); text-decoration: none; transition: 0.3s; }
        .pay-btn:hover { background: var(--brass); color: black; }
