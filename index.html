        :root {

        }

        body {
            font-family: 'Playfair Display', serif;
            margin: 0;
            background-color: var(--dark-oak);
            color: var(--parchment);
            scroll-behavior: smooth;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 8%;
            background: rgba(26, 18, 11, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--leather);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-links { display: flex; gap: 30px; list-style: none; margin: 0; }

        .nav-links a:hover { color: var(--brass); }
